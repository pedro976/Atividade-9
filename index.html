<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Ecommerce - Catálogo</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

    <header>
        <h1>Mini Ecommerce</h1>
        <div class="controls">
            <input type="text" id="search" placeholder="Buscar produto...">
            
            <select id="category">
                </select>

            <button id="btnRender">Renderizar</button>
        </div>
    </header>

    <main>
        <div id="product-list" class="grid-container"></div>
        
        <aside id="product-details" class="details-box">
            <p>Clique em "Ver detalhes" para saber mais sobre um produto.</p>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
